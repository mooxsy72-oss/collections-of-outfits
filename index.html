<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Outfits Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>✦ AI Outfits</h1>
    <button class="dev-btn" id="devToggle">⚙ Dev Mode</button>
  </header>

  <div class="dev-panel hidden" id="devPanel">
    <strong>Add New Outfit</strong>
    <input type="text" id="newTitle" placeholder="Outfit title" />
    <input type="text" id="newImg" placeholder="Image URL (e.g. outfits/3.jpg)" />
    <textarea id="newPrompt" placeholder="Paste your prompt here..."></textarea>
    <button id="addOutfit">+ Add Card</button>
    <p class="dev-note">Cards added here are temporary (page reload resets). To save permanently, copy the JSON output below into outfits.json.</p>
    <textarea class="json-export" id="jsonExport" readonly placeholder="JSON will appear here after adding..."></textarea>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="modal hidden" id="modal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-content">
        <img id="modalImg" src="" alt="" />
        <div class="modal-text">
          <h2 id="modalTitle"></h2>
          <pre id="modalPrompt"></pre>
          <button class="copy-btn" id="modalCopy">Copy Prompt</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
