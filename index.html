<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Коллекция нарядов by Mooxsy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Коллекция нарядов by Mooxsy</h1>
    <button id="themesBtn" class="themes-btn">Мои темы</button>
  </header>

  <div class="filters filters-gender">
    <button class="filter-btn active" data-gender="all">Все</button>
    <button class="filter-btn" data-gender="female">♀ Женское</button>
    <button class="filter-btn" data-gender="male">♂ Мужское</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все наряды</button>
    <button class="filter-btn" data-filter="folk">Народные и исторические</button>
    <button class="filter-btn" data-filter="modern">Современные</button>
    <button class="filter-btn" data-filter="elegant">Элегантное</button>
    <button class="filter-btn" data-filter="fantasy">Фэнтези</button>
    <button class="filter-btn" data-filter="winx">Winx</button>
    <button class="filter-btn" data-filter="postapoc">Постапокалипсис</button>
    <button class="filter-btn" data-filter="knight">Knight core</button>
    <button class="filter-btn" data-filter="rus">Rusreal</button>
    <button class="filter-btn" data-filter="savage">Savage</button>
  </div>

  <div id="gallery" class="gallery"></div>

  <div class="load-more-wrapper">
    <button id="loadMoreBtn" class="btn-load-more">Загрузить ещё</button>
  </div>

  <!-- Модальное окно (Instagram-style) -->
  <div id="modal" class="modal">
    <button id="modalClose" class="modal-close">✕</button>
    <div class="modal-content">
      <div class="modal-left">
        <img id="modalImg" src="" alt="outfit">
      </div>
      <div class="modal-right">
        <div id="modalPrompt" class="modal-prompt-box">Загрузка...</div>
        <div class="modal-footer">
          <button id="btnCopyModal" class="btn-copy-modal">Скопировать</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Панель тем -->
  <div id="themesPanel" class="themes-panel">
    <div id="themesBackdrop" class="themes-backdrop"></div>
    <div class="themes-drawer">
      <div class="themes-drawer-head">
        <h2>Мои темы для SillyTavern</h2>
        <button id="themesClose" class="themes-close">✕</button>
      </div>
      <div id="themesGrid" class="themes-grid"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
