<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Outfit Collection</title> <style> body { margin: 0; font-family: Arial, sans-serif; background: #0f0f0f; color: white; } h1 { text-align: center; padding: 20px; } .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 20px; } .card { background: #1c1c1c; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; } .card:hover { transform: scale(1.03); } .card img { width: 100%; height: 280px; object-fit: cover; } .card p { margin: 10px; font-size: 14px; } /* MODAL */ .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; } .modal-content { background: #1c1c1c; padding: 20px; border-radius: 12px; max-width: 600px; width: 100%; } .modal img { width: 100%; border-radius: 10px; } button { margin-top: 10px; padding: 10px; width: 100%; border: none; border-radius: 8px; cursor: pointer; } </style> </head> <body> <h1>Outfit Collection</h1> <div class="grid"> <div class="card" onclick="openModal( 'https://images.unsplash.com/photo-1520975916090-3105956dac38', 'Emerald Tavern Dress', 'fantasy tavern dress, emerald green fabric, medieval embroidery' )"> <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38"> <p>Emerald Tavern Dress</p> </div> <div class="card" onclick="openModal( 'https://images.unsplash.com/photo-1520975661595-6453be3f7070', 'Gothic Noble Dress', 'gothic dark elegant dress, lace details, fantasy noble style' )"> <img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070"> <p>Gothic Noble Dress</p> </div> </div> <!-- MODAL --> <div class="modal" id="modal" onclick="closeModal(event)"> <div class="modal-content" onclick="event.stopPropagation()"> <img id="modalImg"> <h2 id="modalTitle"></h2> <p id="modalPrompt"></p> <button onclick="copyPrompt()">Copy prompt</button> </div> </div> <script> let currentPrompt = ""; function openModal(img, title, prompt) { document.getElementById("modal").style.display = "flex"; document.getElementById("modalImg").src = img; document.getElementById("modalTitle").innerText = title; document.getElementById("modalPrompt").innerText = prompt; currentPrompt = prompt; } function closeModal(e) { document.getElementById("modal").style.display = "none"; } function copyPrompt() { navigator.clipboard.writeText(currentPrompt); alert("Prompt copied!"); } </script> </body> </html>
