<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коллекция нарядов by Mooxsy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Коллекция нарядов <span>by Mooxsy</span></h1>
    <button class="themes-btn" id="themesBtn">Мои темы</button>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все наряды</button>
    <button class="filter-btn" data-filter="modern">Современные</button>
    <button class="filter-btn" data-filter="folk">Народные и исторические</button>
    <button class="filter-btn" data-filter="fantasy">Фентези</button>
    <button class="filter-btn" data-filter="postapoc">Постапокалипсис</button>
    <button class="filter-btn" data-filter="winx">Winx aesthetics</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <!-- Лайтбокс (увеличенное фото) -->
  <div class="lightbox hidden" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <!-- Панель тем -->
  <div class="themes-panel" id="themesPanel">
    <div class="themes-backdrop" id="themesBackdrop"></div>
    <div class="themes-box">
      <div class="themes-header">
        <h2>Мои темы для SillyTavern</h2>
        <button class="themes-close" id="themesClose">✕</button>
      </div>
      <div class="themes-grid" id="themesGrid"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
