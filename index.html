<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfits Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    margin: 0;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    max-width: 600px;
    width: 90%;
}

.modal img {
    width: 100%;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
}
</style>
</head>

<body>

<h1>Outfits Collection</h1>

<div class="grid" id="grid"></div>

<div class="modal" id="modal" onclick="this.style.display='none'">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg">
    <h2 id="modalTitle"></h2>
    <p id="modalPrompt"></p>
    <button onclick="copyPrompt()">Copy prompt</button>
  </div>
</div>

<script>

const outfits = [
  {
    img: "outfits/1.jpg",
    title: "Outfit 1",
    promptFile: "outfits/1.txt"
  },
  {
    img: "outfits/2.jpg",
    title: "Outfit 2",
    promptFile: "outfits/2.txt"
  },
  {
  img: "outfits/3.jpg",
  title: "Outfit 3",
  promptFile: "outfits/3.txt"
}  
];

const grid = document.getElementById("grid");

outfits.forEach(o => {
    grid.innerHTML += `
    <div class="card" onclick="openModal('${o.img}', '${o.title}', '${o.promptFile}')">
        <img src="${o.img}">
        <p>${o.title}</p>
    </div>`;
});

function openModal(img, title, promptFile) {
    fetch(promptFile)
    .then(r => r.text())
    .then(prompt => {
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalImg").src = img;
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalPrompt").innerText = prompt;
        window.currentPrompt = prompt;
    });
}

function copyPrompt() {
    navigator.clipboard.writeText(window.currentPrompt);
    alert("Copied!");
}

</script>

</body>
</html>
