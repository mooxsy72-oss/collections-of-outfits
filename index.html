<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1d">
  <title>Коллекция нарядов by Mooxsy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
<header>
  <div class="gender-switch">
    <button class="gender-btn active" data-gender="all" title="Показать всё">✦</button>
    <button class="gender-btn" data-gender="female" title="Женское">♀</button>
    <button class="gender-btn" data-gender="male" title="Мужское">♂</button>
  </div>
  <h1>Коллекция нарядов by Mooxsy</h1>
  <button class="themes-btn" id="themesBtn">Мои темы</button>
</header>

  <!-- ── Фильтр по категориям ── -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все наряды</button>
    <button class="filter-btn" data-filter="slavic">Славянское</button>
    <button class="filter-btn" data-filter="folk">Историческое</button>
    <button class="filter-btn" data-filter="modern">Современные</button>
    <button class="filter-btn" data-filter="elegant">Элегантное</button>
    <button class="filter-btn" data-filter="ball">Бальное🎭</button>
    <button class="filter-btn" data-filter="rusreal">Rusreal🚬</button>
    <button class="filter-btn" data-filter="kawaii">Kawaii🌸</button>
    <button class="filter-btn" data-filter="witch">Witch🐈‍⬛</button>
    <button class="filter-btn" data-filter="winx">Winx🧚‍♂️</button>
    <button class="filter-btn" data-filter="knightcore">Knight core⚔️</button>
    <button class="filter-btn" data-filter="Angel">Angel👼</button>
    <button class="filter-btn" data-filter="sexy">Sassy💋</button>
    <button class="filter-btn" data-filter="zazerkalye">Зазеркалье🎩</button>
    <button class="filter-btn" data-filter="postapoc">Постапокалипсис🧟‍♀️</button>
    <button class="filter-btn" data-filter="scifi">sci-fi🛸</button>
    <button class="filter-btn" data-filter="savage">Savage⚒️</button>
    <button class="filter-btn" data-filter="fantasy">Разное</button>
  </div>

  <!-- ── Галерея ── -->
  <div class="gallery" id="gallery"></div>

  <!-- ── Кнопка "Загрузить ещё" ── -->
  <div class="load-more-wrapper">
    <button class="btn-load-more hidden" id="loadMoreBtn">Загрузить ещё</button>
  </div>

  <!-- ── Модальное окно ── -->
  <div class="modal" id="modal">
    <!-- стрелки вынесены наружу контента, ближе к краям экрана -->
    <button class="modal-nav modal-nav-prev" id="modalNavPrev">‹</button>
    <button class="modal-nav modal-nav-next" id="modalNavNext">›</button>

    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>

      <div class="modal-left">
        <div class="modal-img-wrapper" id="modalImgWrapper">
          <img id="modalImg" src="" alt="наряд">
        </div>
      </div>

      <div class="modal-right">
        <div class="modal-prompt-box" id="modalPrompt">Загрузка...</div>
        <div class="modal-footer">
          <button class="btn-copy-modal" id="btnCopyModal"><span>Скопировать</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Панель тем ── -->
  <div class="themes-panel" id="themesPanel">
    <div class="themes-backdrop" id="themesBackdrop"></div>
    <div class="themes-drawer">
      <div class="themes-drawer-head">
        <h2>Мои темы для SillyTavern</h2>
        <button class="themes-close" id="themesClose">✕</button>
      </div>
      <div class="themes-grid" id="themesGrid"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
